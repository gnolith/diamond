name: Release artifact

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run check
      - name: Verify tag matches package version
        shell: bash
        run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"
      - run: npm pack
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: '*.tgz'
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" ./*.tgz --generate-notes --verify-tag

      # npm publication remains deliberately disabled while package.json is
      # private. The open-source release review must remove `private`, confirm
      # package naming, and add an explicit `npm publish --provenance` step.
